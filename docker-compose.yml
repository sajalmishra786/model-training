version: "3"

services:

  api:
    build: .
    container_name: tep_api
    command: uvicorn app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  dashboard:
    build: .
    container_name: tep_dashboard
    command: streamlit run dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    depends_on:
      - api

  tester:
    build: .
    container_name: tep_tester
    command: python testing_final.py
    volumes:
      - .:/app
    depends_on:
      - api
